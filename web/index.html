<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.45/dist/katex.min.css"
      integrity="sha384-UA8juhPf75SzzAMA/4fo3yOU7sBJ0om7SCD2GHq0fZqZco6tr1UCV7nUbk9J90JM"
      crossorigin="anonymous"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("agentx.theme");
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <title>AgentX</title>
  </head>
  <body class="font-sans antialiased bg-background overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
