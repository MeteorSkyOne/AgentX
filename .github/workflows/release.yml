name: Build release artifacts

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev-release' }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - target: windows-arm64
            goos: windows
            goarch: arm64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build embedded binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          output_dir="dist/${{ matrix.target }}"
          bash scripts/build.sh "${output_dir}/agentx${{ matrix.ext }}"

      - name: Package artifact
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          mkdir -p release
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd "dist/${target}" && zip -9 "../../release/agentx-${target}.zip" "agentx${{ matrix.ext }}")
          else
            tar -czf "release/agentx-${target}.tar.gz" -C "dist/${target}" agentx
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: agentx-${{ matrix.target }}
          path: release/*
          if-no-files-found: error
          retention-days: 14

  dev-release:
    name: Publish dev prerelease
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute dev version
        id: devver
        run: |
          set -euo pipefail
          raw="$(git describe --tags --match 'v*' --always --dirty 2>/dev/null || echo "dev")"
          if ! echo "$raw" | grep -qE '^v?[0-9]+\.[0-9]+'; then
            count="$(git rev-list --count HEAD 2>/dev/null || echo "0")"
            raw="0.0.0-dev.${count}"
          fi
          version="$(echo "$raw" | sed -E 's/^v//; s/-([0-9]+)-g[a-f0-9]+$/-dev.\1/; s/-([0-9]+)-g[a-f0-9]+-dirty$/-dev.\1-dirty/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agentx-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum agentx-* > SHA256SUMS

      - name: Create rolling dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: dev
          REPO: ${{ github.repository }}
          DEV_VERSION: ${{ steps.devver.outputs.version }}
        run: |
          set -euo pipefail
          gh release delete "$TAG_NAME" --repo "$REPO" --cleanup-tag --yes >/dev/null 2>&1 || true
          gh release create "$TAG_NAME" release/* \
            --repo "$REPO" \
            --title "$DEV_VERSION" \
            --notes "Development build ${DEV_VERSION} from ${GITHUB_SHA}" \
            --prerelease \
            --latest=false \
            --target "$GITHUB_SHA"

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: agentx-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum agentx-* > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/* --repo "$REPO" --clobber
          else
            gh release create "$TAG_NAME" release/* --repo "$REPO" --title "$TAG_NAME" --generate-notes
          fi
